name: superfit
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy>=1.24
  - scipy>=1.10
  - sympy>=1.12
  - matplotlib>=3.7
  - trimesh>=4.0
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.9.1
      - torchvision==0.24.1
      - torchaudio==2.9.1
      - -e .
      - geolipi>=0.1
      - sysl3d>=0.1
      - connected-components-3d>=3.12
      - libigl>=2.5.1
      - fastsweep>=0.2.0
      - drjit>=1.0
      - distinctipy>=1.3
      - pillow>=10.0
      - pot>=0.9
