name: superfit
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch
  - torchvision
  - numpy>=1.24
  - scipy>=1.10
  - sympy>=1.12
  - matplotlib>=3.7
  - trimesh>=4.0
  - pip:
      - -e .
      - connected-components-3d>=3.12
      - pot>=0.9
      - libigl>=2.5.1
      - fastsweep>=0.2.0
      - distinctipy>=1.3
      - pillow>=10.0
      - jinja2>=3.1
      - moderngl>=5.10
      - moderngl-window>=2.4
